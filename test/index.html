<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Agent</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0f172a;
            color: white;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 900px;
            max-width: 95%;
        }

        .card {
            background: #1e293b;
            padding: 30px;
            border-radius: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        .status {
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        button {
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
        }

        .start {
            background: #22c55e;
            color: white;
        }

        .stop {
            background: #ef4444;
            color: white;
        }

        .box {
            background: #334155;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .box h3 {
            margin-bottom: 10px;
        }

        .content {
            min-height: 80px;
            white-space: pre-wrap;
            line-height: 1.6;
        }

        .mic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 20px auto;
            background: #475569;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 50px;
        }

        .recording {
            background: #ef4444;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }

            100% {
                transform: scale(1);
            }
        }
    </style>
</head>

            </div>

            <div class="box">

                <div id="assistant" class="content"></div>

                processor = audioContext.createScriptProcessor(4096, 1, 1);

                processor.connect(audioContext.destination);

                    const input = event.inputBuffer.getChannelData(0);
                    const pcm = new Int16Array(input.length);

                    for (let i = 0; i < input.length; i++) {
                        let s = Math.max(-1, Math.min(1, input[i]));
                        pcm[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;

                    if (ws && ws.readyState === WebSocket.OPEN) {
                        ws.send(pcm.buffer);
                    }
                };
            };

                        playStreamingBuffer(data.audio);
                    }
                }

                if (data.type === "error") {
                    console.error(data.message);
                }

            };

        // 🌟 New Linear ArrayBuffer Scheduler Engine
        function playStreamingBuffer(base64Data) {
            if (!playbackContext) return;

            // Strip incoming WAV structural headers from middle chunks if present
            let cleanBase64 = base64Data;
            if (cleanBase64.startsWith("UklGR")) {
                // Contains RIFF WAV text marker header block, bypass bytes 0-44
                const rawBinary = atob(cleanBase64);
                if (rawBinary.length > 44) {
                    const headerlessBinary = rawBinary.substring(44);
                    cleanBase64 = btoa(headerlessBinary);
                }
            }

            // Convert base64 straight to standard binary array buffer context
            const binaryString = window.atob(cleanBase64);
            const len = binaryString.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }

            // Parse continuous PCM 16-bit Mono data frames directly
            const rawPCM = new Int16Array(bytes.buffer);
            const bufferLength = rawPCM.length;

            if (bufferLength === 0) return;

            // Build native hardware audio data buffers dynamically
            const audioBuffer = playbackContext.createBuffer(1, bufferLength, 24000);
            const channelData = audioBuffer.getChannelData(0);

            for (let i = 0; i < bufferLength; i++) {
                channelData[i] = rawPCM[i] / 32768.0;
            }

            // Frame timestamp synchronization scheduler
            const bufferSource = playbackContext.createBufferSource();
            bufferSource.buffer = audioBuffer;
            bufferSource.connect(playbackContext.destination);

            const currentTime = playbackContext.currentTime;
            if (nextStartTime < currentTime) {
                nextStartTime = currentTime;
            }

            bufferSource.start(nextStartTime);
            nextStartTime += audioBuffer.duration;
        }

        function stopVoice() {
            if (processor) processor.disconnect();
            if (source) source.disconnect();
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
            }
            if (audioContext && audioContext.state !== "closed") {
                audioContext.close();
            }
            if (playbackContext && playbackContext.state !== "closed") {
                playbackContext.close();
            }
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.close();
            }

            ws = null;
            playbackContext = null;
            micEl.classList.remove("recording");
            statusEl.innerText = "Disconnected";
        }
