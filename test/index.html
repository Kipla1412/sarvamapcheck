</head>

                mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new AudioContext({ sampleRate: 16000 });

                source = audioContext.createMediaStreamSource(mediaStream);
                processor = audioContext.createScriptProcessor(4096, 1, 1);

                source.connect(processor);
                processor.connect(audioContext.destination);

                processor.onaudioprocess = (event) => {
                    const input = event.inputBuffer.getChannelData(0);
                    const pcm = new Int16Array(input.length);

                    for (let i = 0; i < input.length; i++) {
                        // Clamp the values safely within PCM bounds
                        let s = Math.max(-1, Math.min(1, input[i]));
                        pcm[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                    }

                    if (ws && ws.readyState === WebSocket.OPEN) {
                        // 🌟 Send raw structured PCM binary frame
                        ws.send(pcm.buffer);
                    }
                };
            };

            ws.onmessage = async (event) => {
                const data = JSON.parse(event.data);

                if (data.type === "transcript") {
                    transcriptEl.innerHTML = data.text;
                }

                if (data.type === "text_delta") {
                    assistantEl.innerHTML += data.text;
                }

                if (data.type === "assistant_text") {
                    assistantEl.innerHTML = data.text;
                }

                if (data.type === "audio") {
                    audioQueue.push(data.audio);
                    processAudioQueue();
                }

                if (data.type === "error") {
                    console.error(data.message);
                }
            };

            ws.onerror = (error) => {
                console.log("WebSocket Error: ", error);
            };

            ws.onclose = () => {
                console.log("Disconnected from server");
                stopVoice();
            };
        }

        function processAudioQueue() {
            if (isPlaying || audioQueue.length === 0) return;

            isPlaying = true;
            const nextAudioBase64 = audioQueue.shift();

            // 🌟 FIX: Updated codec type header to wave/wav to match 24kHz engine settings
            const audio = new Audio("data:audio/wav;base64," + nextAudioBase64);

            audio.onended = () => {
                isPlaying = false;
                processAudioQueue();
            };

            audio.onerror = (e) => {
                console.error("Audio block playback failed:", e);
                isPlaying = false;
                processAudioQueue();
            };

            audio.play().catch(err => {
                console.error("Audio playback failure trigger:", err);
                isPlaying = false;
                processAudioQueue();
            });
        }

        function stopVoice() {
            if (processor) processor.disconnect();
            if (source) source.disconnect();
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
            }
            if (audioContext && audioContext.state !== "closed") {
                audioContext.close();
            }
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.close();
            }

            ws = null;
            micEl.classList.remove("recording");
            statusEl.innerText = "Disconnected";
            audioQueue = [];
            isPlaying = false;
        }
    </script>

                            event.inputBuffer

                        const pcm =
                            new Int16Array(
                                input.length
                            );

                        for (
                            let i = 0;
                            i < input.length;
                            i++
                        ) {

                            pcm[i] =
                                Math.max(
                                    -1,
                                    Math.min(
                                        1,
                                        input[i]
                                    )
                                ) * 32767;

                        if (
                            ws &&

                        ) {

                            ws.send(
                                pcm.buffer
                            );

                        const audio =

                    );

                        "Disconnected";

                    micEl.classList.remove(
                        "recording"
                    );

        function stopVoice() {

            if (processor) {

                processor.disconnect();
            }

            if (source) {

                source.disconnect();
            }

            if (mediaStream) {

                mediaStream
                    .getTracks()
                    .forEach(
                        track =>
                            track.stop()
                    );
            }

            if (audioContext) {

                audioContext.close();
            }

            if (ws) {

                ws.close();
            }

            micEl.classList.remove(
                "recording"
            );

            statusEl.innerText =
                "Stopped";
        }
