<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f172a;
            color: #e2e8f0;
            font-family: system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container { width: 720px; max-width: 95%; }
        .card {
            background: #1e293b;
            padding: 32px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        h1 { text-align: center; margin-bottom: 8px; font-size: 1.5rem; }
        .subtitle { text-align: center; color: #94a3b8; margin-bottom: 24px; font-size: 0.9rem; }
        .status-bar {
            display: flex; justify-content: center; align-items: center; gap: 8px;
            margin-bottom: 24px; font-size: 0.9rem;
        }
        .status-dot {
            width: 10px; height: 10px; border-radius: 50%; background: #ef4444;
            display: inline-block; transition: background 0.3s;
        }
        .status-dot.connected { background: #22c55e; }
        .mic-btn {
            width: 100px; height: 100px; border-radius: 50%;
            border: 3px solid #475569; background: #334155;
            color: white; font-size: 2.5rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 24px; transition: all 0.3s;
        }
        .mic-btn:hover { border-color: #64748b; background: #3b4a5f; }
        .mic-btn.recording {
            border-color: #ef4444; background: #7f1d1d;
            animation: pulse 1.2s infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); }
            50% { box-shadow: 0 0 0 16px rgba(239,68,68,0); }
        }
        .box {
            background: #334155; padding: 16px; border-radius: 12px;
            margin-bottom: 16px; min-height: 80px;
        }
        .box:last-child { margin-bottom: 0; }
        .box h3 { font-size: 0.85rem; color: #94a3b8; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
        .content { white-space: pre-wrap; line-height: 1.6; font-size: 0.95rem; }
        .content:empty::after { content: "Waiting..."; color: #64748b; font-style: italic; }
        .controls { display: flex; justify-content: center; gap: 12px; margin-bottom: 24px; }
        .controls button {
            padding: 10px 24px; border: none; border-radius: 8px;
            font-size: 0.9rem; cursor: pointer; font-weight: 600;
            transition: opacity 0.2s;
        }
        .controls button:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-start { background: #22c55e; color: white; }
        .btn-stop { background: #ef4444; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>AI Voice Agent</h1>
            <p class="subtitle">Speech-to-Speech with SarvamAI</p>

            <div class="status-bar">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">Disconnected</span>
            </div>

            <button class="mic-btn" id="micBtn" onclick="toggleVoice()">🎤</button>

            <div class="controls">
                <button class="btn-start" id="startBtn" onclick="startVoice()">Start</button>
                <button class="btn-stop" id="stopBtn" onclick="stopVoice()" disabled>Stop</button>
            </div>

            <div class="box">
                <h3>You said</h3>
                <div id="transcript" class="content"></div>
            </div>

            <div class="box">
                <h3>Assistant</h3>
                <div id="assistant" class="content"></div>
            </div>
        </div>
    </div>

    <script>
        let ws = null;
        let audioContext = null;
        let processor = null;
        let source = null;
        let mediaStream = null;
        let isRecording = false;

        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const transcriptEl = document.getElementById('transcript');
        const assistantEl = document.getElementById('assistant');
        const micBtn = document.getElementById('micBtn');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');

        function setStatus(connected) {
            statusDot.className = 'status-dot' + (connected ? ' connected' : '');
            statusText.textContent = connected ? 'Connected' : 'Disconnected';
        }

        async function startVoice() {
            if (ws) return;

            assistantEl.innerHTML = '';
            transcriptEl.innerHTML = '';

            ws = new WebSocket('ws://localhost:8000/audio');
            ws.binaryType = 'arraybuffer';

            ws.onopen = async () => {
                console.log('Connected');
                setStatus(true);
                isRecording = true;
                micBtn.classList.add('recording');
                startBtn.disabled = true;
                stopBtn.disabled = false;

                try {
                    mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    audioContext = new AudioContext({ sampleRate: 16000 });
                    source = audioContext.createMediaStreamSource(mediaStream);
                    processor = audioContext.createScriptProcessor(4096, 1, 1);

                    source.connect(processor);
                    processor.connect(audioContext.destination);

                    processor.onaudioprocess = (event) => {
                        if (!ws || ws.readyState !== WebSocket.OPEN) return;
                        const input = event.inputBuffer.getChannelData(0);
                        const pcm = new Int16Array(input.length);
                        for (let i = 0; i < input.length; i++) {
                            pcm[i] = Math.max(-1, Math.min(1, input[i])) * 32767;
                        }
                        ws.send(pcm.buffer);
                    };
                } catch (err) {
                    console.error('Mic error:', err);
                    stopVoice();
                }
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                console.log('WS message:', data.type);

                switch (data.type) {
                    case 'transcript':
                        transcriptEl.innerHTML = data.text;
                        break;
                    case 'text_delta':
                        assistantEl.innerHTML += data.text;
                        break;
                    case 'assistant_text':
                        assistantEl.innerHTML = data.text;
                        break;
                    case 'audio':
                        const audio = new Audio('data:audio/wav;base64,' + data.audio);
                        audio.play().catch(e => console.error('Audio play error:', e));
                        break;
                    case 'error':
                        console.error('Server error:', data.message);
                        break;
                }
            };

            ws.onerror = (err) => console.error('WS error:', err);

            ws.onclose = () => {
                console.log('Disconnected');
                setStatus(false);
                cleanup();
                ws = null;
            };
        }

        function stopVoice() {
            if (ws) {
                ws.close();
            }
            cleanup();
        }

        function cleanup() {
            if (processor) { processor.disconnect(); processor = null; }
            if (source) { source.disconnect(); source = null; }
            if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
            if (audioContext) { audioContext.close(); audioContext = null; }
            isRecording = false;
            micBtn.classList.remove('recording');
            startBtn.disabled = false;
            stopBtn.disabled = true;
        }

        function toggleVoice() {
            if (isRecording) stopVoice();
            else startVoice();
        }
    </script>
</body>
</html>
